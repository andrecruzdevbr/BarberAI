services:
  postgres:
    image: postgres:16-alpine
    container_name: barberai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: barberai
      POSTGRES_PASSWORD: barberai
      POSTGRES_DB: barberai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberai -d barberai"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barberai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: BarberAI API
      APP_ENV: development
      APP_DEBUG: "true"
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      DATABASE_URL: postgresql+psycopg://barberai:barberai@postgres:5432/barberai
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
